name: Personal Intelligence Platform

on:
  schedule:
    # GitHub cron is UTC. 01:30 UTC is 07:00 IST.
    - cron: "30 1 * * *"
    # Backup run at 04:30 UTC / 10:00 IST; cache prevents duplicate scheduled sends.
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate artifacts without sending email"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get IST date
        run: echo "IST_DATE=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Check if scheduled brief already sent today
        id: check-sent
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: personal-intel-sent-${{ env.IST_DATE }}

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Run source-driven intelligence pipeline
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || 'sendgrid' }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit memory and history updates
        if: success() && (github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/memory.json data/history/
          git diff --staged --quiet || git commit -m "chore: update intelligence memory [skip ci]"
          git push

      - name: Mark scheduled brief as sent today
        if: success() && github.event_name == 'schedule' && steps.check-sent.outputs.cache-hit != 'true'
        run: echo "sent" > .sent-marker

      - name: Save scheduled sent marker
        if: success() && github.event_name == 'schedule' && steps.check-sent.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: personal-intel-sent-${{ env.IST_DATE }}

      - name: Already sent today
        if: github.event_name == 'schedule' && steps.check-sent.outputs.cache-hit == 'true'
        run: echo "Brief already sent for ${{ env.IST_DATE }}, skipping."
