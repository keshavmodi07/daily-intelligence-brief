name: Daily Intelligence Brief

on:
  schedule:
    - cron: "25 2 * * *"
      timezone: Asia/Kolkata
    - cron: "0 7 * * *"
      timezone: Asia/Kolkata
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get IST date
        run: echo "IST_DATE=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Check if brief already sent today
        id: check-sent
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .sent-marker
          key: brief-sent-${{ env.IST_DATE }}

      - name: Set up Python 3.11
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Generate and send daily briefing
        if: github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_PROVIDER: sendgrid
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python main.py

      - name: Commit memory updates
        if: success() && (github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add memory.json
          git diff --staged --quiet || git commit -m "chore: update intelligence memory [skip ci]"
          git push

      - name: Mark brief as sent today
        if: success() && (github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true')
        run: echo "sent" > .sent-marker

      - name: Save sent marker
        if: success() && (github.event_name == 'workflow_dispatch' || steps.check-sent.outputs.cache-hit != 'true')
        uses: actions/cache/save@v4
        with:
          path: .sent-marker
          key: brief-sent-${{ env.IST_DATE }}

      - name: Already sent today
        if: github.event_name == 'schedule' && steps.check-sent.outputs.cache-hit == 'true'
        run: echo "Brief already sent for ${{ env.IST_DATE }}, skipping."
